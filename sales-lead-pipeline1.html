<!--
LAYOUT PLAN  (viewBox 0 0 2400 720, scaled via preserveAspectRatio)
Y-rows:
  Main spine    cy = 360
  Ent-top       cy = 180   (enterprise sub-branch YES)
  Ent-mid       cy = 360   (enterprise continues on spine after IF#1)
  Ent-bot       cy = 540   (enterprise sub-branch NO)
  SMB           cy = 560   (SMB branch from IF#0)

NODE MAP  (cx, cy)
N0  Webhook Trigger        110, 360   TRIGGER  → pulse
N1  Fetch CRM              300, 360   middle
N2  Enrich Clearbit        490, 360   middle
N3  AI Score Claude        680, 360   middle
N4  Validate               870, 360   middle
N5  IF Tier (Ent/SMB)     1060, 360   middle  ← first branch
N6  Research Perplexity   1260, 180   middle  (enterprise upper)
N7  AI Pitch Claude       1460, 180   middle
N8  IF Approved           1650, 180   middle  ← second branch
N9  Send Email Gmail      1850, 100   middle
N10 CRM Deal Salesforce   2080, 100   TERMINAL → pulse
N11 Flag Review Slack     1850, 260   TERMINAL → pulse
N12 Segment HubSpot       1260, 560   middle  (SMB lower)
N13 Drip Mailchimp        1460, 560   middle
N14 Tag Airtable          1650, 560   TERMINAL → pulse

CONNECTORS:
c01  N0→N1  straight  360→360
c12  N1→N2  straight
c23  N2→N3  straight
c34  N3→N4  straight
c45  N4→N5  straight
c56e N5→N6  curve up   360→180  (enterprise)
c56s N5→N12 curve down 360→560  (SMB)
c67  N6→N7  straight   180→180
c78  N7→N8  straight   180→180
c89y N8→N9  curve up   180→100  (YES)
c89n N8→N11 curve down 180→260  (NO)
c9_10 N9→N10 straight  100→100
c12_13 N12→N13 straight 560→560
c13_14 N13→N14 straight 560→560

PULSE NODES: N0 (trigger), N10 (terminal), N11 (terminal), N14 (terminal)
ALL OTHERS: no pulse
-->

<defs>
  <pattern id="grid-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="1" fill="rgba(255,255,255,0.05)"/>
  </pattern>
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
  </radialGradient>
  <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
  </filter>

  <!-- CONNECTOR PATHS -->
  <!-- Main spine -->
  <path id="c01"  d="M 172,360 L 238,360"/>
  <path id="c12"  d="M 362,360 L 428,360"/>
  <path id="c23"  d="M 552,360 L 618,360"/>
  <path id="c34"  d="M 742,360 L 808,360"/>
  <path id="c45"  d="M 932,360 L 998,360"/>
  <!-- IF Tier → Enterprise (up to 180) -->
  <path id="c56e" d="M 1122,360 C 1170,360 1190,180 1198,180"/>
  <!-- IF Tier → SMB (down to 560) -->
  <path id="c56s" d="M 1122,360 C 1170,360 1190,560 1198,560"/>
  <!-- Enterprise spine -->
  <path id="c67"  d="M 1322,180 L 1398,180"/>
  <path id="c78"  d="M 1522,180 L 1588,180"/>
  <!-- IF Approved → YES (up to 100) -->
  <path id="c89y" d="M 1712,180 C 1750,180 1770,100 1788,100"/>
  <!-- IF Approved → NO (down to 260) -->
  <path id="c89n" d="M 1712,180 C 1750,180 1770,260 1788,260"/>
  <!-- YES chain -->
  <path id="c9_10" d="M 1912,100 L 2018,100"/>
  <!-- SMB chain -->
  <path id="c12_13" d="M 1322,560 L 1398,560"/>
  <path id="c13_14" d="M 1522,560 L 1588,560"/>
</defs>

<!-- BACKGROUND -->
<rect width="2400" height="720" fill="#1a1a2e"/>
<rect width="2400" height="720" fill="url(#grid-dots)"/>

<!-- TITLE -->
<g class="title-g">

  </text>
</g>
