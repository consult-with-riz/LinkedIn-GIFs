<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>LinkedIn Content Pipeline — Soch</title>

</head>
<body>
<svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg">
<defs>

  <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="3" result="blur"/>

  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">

  <path id="c12" d="M 362,310 L 428,310"/>

  <path id="c23" d="M 552,310 L 618,310"/>

  <path id="c34a" d="M 742,310 C 790,310 810,185 838,185"/>
  <!-- N4(900,185) → N5(1090,185) -->
  <path id="c45" d="M 962,185 L 1028,185"/>

  <path id="c36r" d="M 742,310 C 790,310 810,435 838,435"/>

<!-- BACKGROUND -->
<rect width="1200" height="680" fill="#1a1a2e"/>

<g class="title-g">
  <text x="600" y="46" text-anchor="middle"

</use>
<circle r="6" fill="#4a90d9" filter="url(#glow-soft)">
