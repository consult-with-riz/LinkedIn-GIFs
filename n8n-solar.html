<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>n8n Automation Workflow Ecosystem</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #07091A;
    font-family: 'DM Sans', sans-serif;
  }
  svg { display: block; width: 100vw; height: 100vh; }

  @keyframes title-in {
    from { opacity: 0; letter-spacing: 0.35em; }
    to   { opacity: 1; letter-spacing: 0.12em; }
  }
  .title { animation: title-in 1.4s ease-out forwards; }

  @keyframes twinkle {
    0%,100% { opacity: 0.12; } 50% { opacity: 0.7; }
  }
  .star { animation: twinkle var(--d, 3s) ease-in-out infinite var(--del, 0s); }

  @keyframes core-breathe {
    0%,100% { r: 62; opacity: 0.92; } 50% { r: 68; opacity: 1; }
  }
  .core-ball { animation: core-breathe 3s ease-in-out infinite; }

  @keyframes ring-pulse {
    0%   { r: 75;  stroke-opacity: 0.45; }
    100% { r: 140; stroke-opacity: 0; }
  }
  .ring1 { animation: ring-pulse 3.6s ease-out infinite 0s; }
  .ring2 { animation: ring-pulse 3.6s ease-out infinite 1.2s; }
  .ring3 { animation: ring-pulse 3.6s ease-out infinite 2.4s; }

  @keyframes glow-line {
    0%,100% { stroke-opacity: 0.08; }
    50%      { stroke-opacity: 0.6; }
  }
  .c0 { stroke: #FF6B35; animation: glow-line 2.8s ease-in-out infinite 0.00s; }
  .c1 { stroke: #00D4FF; animation: glow-line 2.8s ease-in-out infinite 0.40s; }
  .c2 { stroke: #9B5CF6; animation: glow-line 2.8s ease-in-out infinite 0.80s; }
  .c3 { stroke: #00E676; animation: glow-line 2.8s ease-in-out infinite 1.20s; }
  .c4 { stroke: #FF4081; animation: glow-line 2.8s ease-in-out infinite 1.60s; }
  .c5 { stroke: #FFD740; animation: glow-line 2.8s ease-in-out infinite 2.00s; }
  .c6 { stroke: #40C4FF; animation: glow-line 2.8s ease-in-out infinite 2.40s; }

  .node-g { opacity: 0; }

  @keyframes blink-cursor {
    0%,49% { opacity: 1; } 50%,100% { opacity: 0; }
  }
  .cursor { animation: blink-cursor 1s step-start infinite; }
</style>
</head>
