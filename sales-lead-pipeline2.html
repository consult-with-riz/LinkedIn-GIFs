<!--
S-SHAPE LAYOUT  viewBox="0 0 1200 760"
Card size: 90×90  (cx±45, cy±45)

ROW 1  y=170  LEFT→RIGHT   N0…N5
  N0  cx=110  N1  cx=280  N2  cx=450  N3  cx=620  N4  cx=790  N5  cx=1060 (IF Tier — wider gap for wrap)

WRAP 1: N5(1060,170) → curve down-right → N6(1060,370)  [vertical drop]

ROW 2  y=370  RIGHT→LEFT   N6…N10
  N6  cx=1060  N7  cx=870  N8  cx=680  N9  cx=490  N10 cx=300  (N10 = IF Approved)

WRAP 2: N10(300,370) → curve down-left → N11(140,370) → drop to N11(140,570)  actually:
  N10(300,370) → bezier down to N11(140,570) — left-swooping S-curve

ROW 3  y=570  LEFT→RIGHT   N11…N14
  N11 cx=300  N12 cx=520  N13 cx=740  N14 cx=960

TERMINALS: N14 is one terminal (SMB tag).
But we also have 2 branch terminals from IF Approved (N10):
  Actually restructuring: to make a clean S, I fold the branches INTO the S-snake.
  No explicit Y-branches — instead the two IF branches each go to a node in row 3.

REVISED PLAN — pure snake, no Y-branches, for clean S:
Row 1 L→R:  N0(110,170) N1(300,170) N2(490,170) N3(680,170) N4(870,170) N5(1060,170)
  Wrap right side: bezier from N5(1060,170) down to N6(1060,370)
Row 2 R→L:  N6(1060,370) N7(870,370) N8(680,370) N9(490,370) N10(300,370) N11(110,370)
  Wrap left side: bezier from N11(110,370) down to N12(110,570)
Row 3 L→R:  N12(110,570) N13(300,570) N14(490,570)  — with IF-branch to N15(680,570) and N16(870,570)... 
  but we only have 15 nodes total so:
Row 3 L→R:  N12(110,570) N13(300,570) N14(490,570) N15=terminal(680,570)  [4 nodes in row3]
  Plus the branching 2 terminals off IF N14: N14a(490,480) N14b(490,660) — NO too messy

FINAL CLEAN S — 15 nodes pure snake (no Y-branch):
Row 1 L→R (6): N0 N1 N2 N3 N4 N5   y=160
Row 2 R→L (5): N6 N7 N8 N9 N10     y=390
Row 3 L→R (4): N11 N12 N13 N14     y=600  (+ one branch from N10 to N15 below = 15th node at y=470 branching off)

ABSOLUTE FINAL:
Row 1 y=165:  N0(100) N1(280) N2(460) N3(640) N4(820) N5(1000)  → 6 nodes
  right-wrap: N5(1000,165) curve to N6(1100,165) then down to N6(1100,390) — use cx=1100
Row 2 y=390 RIGHT→LEFT: N6(1100) N7(920) N8(740) N9(560) N10(380) N11(200) → 6 nodes
  left-wrap: N11(200,390) curve down to N12(100,390) sweep to N12(100,600)
Row 3 y=600 LEFT→RIGHT: N12(100) N13(300) N14(500) [last 3 = 15 total? No: 6+6+3=15 YES!]

NODE ROLES:
N0  Form Trigger    #EA6A47  TRIGGER+PULSE
N1  Fetch CRM       #2db8b0  middle
N2  Enrich Lead     #2db8b0  middle
N3  AI Score        #e8a838  middle
N4  Validate        #e8a838  middle
N5  IF Tier         #7c6af7  middle
N6  Research Acct   #2db8b0  middle
N7  AI Pitch Gen    #e8a838  middle
N8  IF Approved     #7c6af7  middle
N9  Send Pitch      #4a90d9  middle
N10 Create Deal     #2da47e  middle
N11 Segment SMB     #2da47e  middle
N12 Drip Sequence   #4a90d9  middle
N13 Tag + Log       #d96aa4  middle
N14 Pipeline Done   #00E676  TERMINAL+PULSE

PULSE: N0 (trigger) and N14 (sole terminal)
ALL others: no pulse

CONNECTORS:
c01  (100,165)→(280,165)  straight
c12  (280,165)→(460,165)  straight
c23  (460,165)→(640,165)  straight
c34  (640,165)→(820,165)  straight
c45  (820,165)→(1000,165) straight
c5w  (1000,165) wrap-right curve down to (1100,390)
c67  (1100,390)→(920,390) straight (rightward node is N6, goes LEFT)
c78  (920,390)→(740,390)  straight
c89  (740,390)→(560,390)  straight
c9_10 (560,390)→(380,390) straight
c10_11 (380,390)→(200,390) straight
c11w  (200,390) wrap-left curve down to (100,600)
c12_13 (100,600)→(300,600) straight
c13_14 (300,600)→(500,600) straight

Wrap right bezier: M 1045,165 C 1130,165 1145,200 1145,390 — exits right of N5, sweeps down to N6
Wrap left bezier: M 155,390 C 60,390 55,430 100,600 — exits left of N11, swoops down to N12
-->
