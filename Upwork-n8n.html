<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Upwork Proposal Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  svg { width: 100vw; height: 100vh; }
  .title-g { animation: title-in 1s ease-out forwards; opacity: 0; }
  @keyframes title-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="'Space Grotesk',sans-serif">
<defs>
  <pattern id="grid-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="1" fill="rgba(255,255,255,0.055)"/>
  </pattern>
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
  </radialGradient>
  <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
  </filter>

  <!--
    LAYOUT
    Row 1 (y=190, left→right): N0(cx=120) N1(cx=310) N2(cx=500) N3(cx=710)
    Bend down: N3 bottom (710,252) → N4 top (710,348)
    Row 2 (y=410, right→left): N4(cx=710) N5(cx=520) N6(cx=310)

    Card half = 62px
    Row1 card: top=128, bottom=252
    Row2 card: top=348, bottom=472
    Connector right-edge of card = cx+62, left-edge = cx-62
    Connector mid-right-of-card = cx+62, y=row_y
    Connector mid-left-of-card  = cx-62, y=row_y

    c01: (182,190)→(248,190)
    c12: (372,190)→(438,190)
    c23: (562,190)→(648,190)
    c3down: (710,252)→(710,348)  vertical bezier
    c45: (648,410)→(582,410)  right-to-left
    c56: (458,410)→(372,410)  right-to-left
  -->
  <path id="c01"    d="M 182,190 L 248,190"/>
  <path id="c12"    d="M 372,190 L 438,190"/>
  <path id="c23"    d="M 562,190 L 648,190"/>
  <path id="c3down" d="M 710,252 C 710,300 710,300 710,348"/>
  <path id="c45"    d="M 648,410 L 582,410"/>
  <path id="c56"    d="M 458,410 L 372,410"/>
</defs>

<!-- Background -->
<rect width="900" height="600" fill="#1a1a2e"/>
<rect width="900" height="600" fill="url(#grid-dots)"/>
<rect width="900" height="600" fill="url(#vignette)"/>

<!-- Title -->
<g class="title-g">
  <text x="450" y="44" text-anchor="middle" font-size="17" font-weight="700" fill="#F5EFE0" letter-spacing="1">UPWORK PROPOSAL PIPELINE</text>

</g>

<!-- Row direction labels -->
<g opacity="0">

</g>
