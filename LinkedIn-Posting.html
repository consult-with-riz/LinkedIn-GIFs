<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Content Scheduling Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #1a1a2e; overflow: hidden; }
  svg { display: block; width: 100%; height: 100%; }
  .title-g { animation: title-in 1s ease-out forwards; opacity: 0; }
  @keyframes title-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
<defs>

  <pattern id="grid-dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="14" cy="14" r="1" fill="rgba(255,255,255,0.055)"/>
  </pattern>
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.5)"/>
  </radialGradient>
  <filter id="glow-soft" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
  </filter>

  <!--
    Layout:
    N0 Kursor    cx=110  cy=340  (trigger)
    N1 GCal      cx=310  cy=340  (middle)
    N2 Lasso     cx=560  cy=185  (branch top)
    N3 LinkedIn  cx=560  cy=340  (branch mid)
    N4 Gmail     cx=560  cy=495  (branch bot)
    N5 Slack     cx=820  cy=340  (terminal)
  -->

  <!-- N0→N1 straight -->
  <path id="c01" d="M 172,340 L 248,340"/>
  <!-- N1→N2 fan up -->
  <path id="c12u" d="M 372,340 C 430,340 450,185 498,185"/>
  <!-- N1→N3 straight -->
  <path id="c13m" d="M 372,340 L 498,340"/>
  <!-- N1→N4 fan down -->
  <path id="c14d" d="M 372,340 C 430,340 450,495 498,495"/>
  <!-- N2→N5 converge from top -->
  <path id="c25" d="M 622,185 C 680,185 700,340 758,340"/>
  <!-- N3→N5 straight -->
  <path id="c35" d="M 622,340 L 758,340"/>
  <!-- N4→N5 converge from bottom -->
  <path id="c45" d="M 622,495 C 680,495 700,340 758,340"/>

</defs>

<!-- Background -->
<rect width="1200" height="680" fill="#1a1a2e"/>
<rect width="1200" height="680" fill="url(#grid-dots)"/>
<rect width="1200" height="680" fill="url(#vignette)"/>

<!-- Title -->
<g class="title-g">
  <text x="600" y="44" text-anchor="middle"
    font-family="'Space Grotesk',sans-serif" font-size="19" font-weight="700"
    fill="#F5EFE0" letter-spacing="1">CONTENT SCHEDULING &amp; DISTRIBUTION</text>
  <text x="600" y="64" text-anchor="middle"
    font-family="'DM Sans',sans-serif" font-size="10.5"
    fill="rgba(245,239,224,0.38)" letter-spacing="3">PLAN → SCHEDULE → PUBLISH ACROSS CHANNELS → NOTIFY TEAM</text>
</g>

═══════════════════ -->

<!-- c01 N0→N1 -->

  <animate attributeName="stroke-opacity" values="0;0.55;0" dur="2s" begin="0s" repeatCount="indefinite"/>
</use>
<circle r="6" fill="#EA6A47" filter="url(#glow-soft)">
  <animateMotion dur="0.7s" begin="0.8s" repeatCount="indefinite" calcMode="linear"><mpath href="#c01"/></animateMotion>
</circle>
<circle r="3" fill="rgba(255,255,255,0.7)">
  <animateMotion dur="0.7s" begin="0.85s" repeatCount="indefinite" calcMode="linear"><mpath href="#c01"/></animateMotion>
</circle>
