<style>

  svg { display: block; width: 100vw; height: 100vh; }

  @keyframes pulse-ring {
    0%   { r: 28; stroke-opacity: 0.6; }
    100% { r: 52; stroke-opacity: 0; }
  }
  .pr { animation: pulse-ring 2.4s ease-out infinite; }
  .pr1 { animation: pulse-ring 2.4s ease-out infinite 0.8s; }
  .pr2 { animation: pulse-ring 2.4s ease-out infinite 1.6s; }

  @keyframes status-dot {
    0%,100% { opacity: 1; } 50% { opacity: 0.3; }
  }
  .sdot { animation: status-dot 1.6s ease-in-out infinite; }

  @keyframes title-in {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .title-g { animation: title-in 1s ease-out forwards; }

  @keyframes branch-label-in {
    from { opacity: 0; } to { opacity: 1; }
  }
</style>
</head>
